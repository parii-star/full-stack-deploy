<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monthly Expenditure</title>
  </head>
  <body>
    <div id="app">
      <h1>Monthly Expenditure</h1>
      <p class="subtitle">Track your spending by month.</p>

      <div class="card" aria-label="Monthly expenditure app">
        <div class="toolbar">
          <label class="field">
            <span>Month</span>
            <input id="month" type="month" />
          </label>
          <div class="summary" aria-live="polite">
            <div class="summary-label">Total</div>
            <div id="total" class="summary-value">—</div>
          </div>
        </div>

        <form id="expense-form" class="form" autocomplete="off">
          <label class="field">
            <span>Date</span>
            <input id="date" type="date" required />
          </label>

          <label class="field">
            <span>Category</span>
            <input id="category" type="text" placeholder="Food, Travel, Rent..." required />
          </label>

          <label class="field">
            <span>Amount</span>
            <input id="amount" type="number" step="0.01" placeholder="0.00" required />
          </label>

          <label class="field field-wide">
            <span>Note (optional)</span>
            <input id="note" type="text" placeholder="e.g. Lunch with friends" />
          </label>

          <button id="add" type="submit" class="btn">Add expense</button>
          <div id="status" class="status" aria-live="polite"></div>
        </form>

        <div class="list">
          <div class="list-head">
            <div>Date</div>
            <div>Category</div>
            <div class="right">Amount</div>
            <div></div>
          </div>
          <div id="items" class="list-body"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
