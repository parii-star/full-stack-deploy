services:
  db:
    image: 'postgres:16'

    restart: unless-stopped

    environment:
      POSTGRES_USER: '${POSTGRES_USER:-postgres}'
      POSTGRES_PASSWORD: '${POSTGRES_PASSWORD:-postgres}'
      POSTGRES_DB: '${POSTGRES_DB:-expenses}'

    healthcheck:
      test:
        - CMD-SHELL
        - 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB'

      interval: 5s
      timeout: 5s
      retries: 20

    expose:
      - '5432'

    volumes:
      - 'postgres-data:/var/lib/postgresql/data'

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    environment:
      PORT: 3000

      DATABASE_URL: 'postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-expenses}'

      CORS_ORIGIN: 'http://coolify.paripatodi.com'

    expose:
      - '3000'

  web:
    build:
      context: ./web
      dockerfile: Dockerfile

    restart: unless-stopped

    depends_on:
      - api

    labels:
      - traefik.enable=true
      - traefik.http.routers.expense.rule=Host(`coolify.paripatodi.com`)
      - traefik.http.routers.expense.entrypoints=http
      - traefik.http.services.expense.loadbalancer.server.port=80

    expose:
      - '80'

volumes:
  postgres-data: null